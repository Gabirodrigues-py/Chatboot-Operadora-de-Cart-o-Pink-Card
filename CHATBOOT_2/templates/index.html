<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pink Card - Assistente Virtual</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div id="chat-container">
    <div id="header">
        <img src="{{ url_for('static', filename='logo_sem_fundo.png') }}" alt="Pink Card">
        <span>Assistente Virtual</span>
    </div>
    
    <div id="cpf-area">
        <input type="text" id="cpf" placeholder="Informe seu CPF para iniciar" maxlength="11">
        <button onclick="realizarLogin()">Acessar</button>
    </div>

    <div id="mensagens">
        <div class="bot-wrapper">
            <img src="{{ url_for('static', filename='atendente.png') }}" class="bot-icon">
            <div class="bubble bot">
                Olá! Bem-vinda à <b>Pink Card</b>. <br>
                Por favor, valide seu CPF acima para começarmos o atendimento.
            </div>
        </div>
    </div>

    <div id="input-area" style="display: none;">
        <input type="text" id="pergunta" placeholder="Digite sua dúvida ou 'sair'...">
        <button onclick="enviarMensagem()">Enviar</button>
    </div>
</div>

<script>
    let cpfSessao = "";
    // Caminho da imagem do bot definido pelo Flask para uso no JS
    const botIconUrl = "{{ url_for('static', filename='atendente.png') }}";

    // Função de Autenticação Inicial
    async function realizarLogin() {
        const cpfInput = document.getElementById('cpf');
        const cpfVal = cpfInput.value.trim();

        if (cpfVal.length < 11) {
            alert("Por favor, digite um CPF válido com 11 dígitos.");
            return;
        }

        // Envia uma saudação inicial ('oi') para validar o CPF no banco
        const response = await fetch('/perguntar', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ cpf: cpfVal, pergunta: "oi" })
        });

        const dados = await response.json();

        if (dados.autenticado) {
            cpfSessao = cpfVal;
            // Troca as telas: esconde CPF e mostra Chat
            document.getElementById('cpf-area').style.display = 'none';
            document.getElementById('input-area').style.display = 'flex';
            adicionarMensagem("bot", dados.resposta);
        } else {
            alert(dados.resposta);
        }
    }

    // Função para enviar perguntas durante a sessão
    async function enviarMensagem() {
        const campoPergunta = document.getElementById('pergunta');
        const texto = campoPergunta.value.trim();

        if (!texto) return;

        // Exibe a mensagem do usuário na tela
        adicionarMensagem("user", texto);
        campoPergunta.value = "";

        const response = await fetch('/perguntar', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ cpf: cpfSessao, pergunta: texto })
        });

        const dados = await response.json();
        
        // Se o servidor retornar sinal de encerramento
        if (dados.encerrar) {
            adicionarMensagem("bot", dados.resposta);
            document.getElementById('input-area').style.display = 'none';
        } else {
            adicionarMensagem("bot", dados.resposta);
        }
    }

    // Função auxiliar para renderizar as bolhas de chat
    function adicionarMensagem(tipo, texto) {
        const boxMensagens = document.getElementById('mensagens');
        
        if (tipo === "bot") {
            boxMensagens.innerHTML += `
                <div class="bot-wrapper">
                    <img src="${botIconUrl}" class="bot-icon">
                    <div class="bubble bot">${texto}</div>
                </div>`;
        } else {
            boxMensagens.innerHTML += `
                <div class="bubble user">${texto}</div>`;
        }

        // Faz o scroll automático para a última mensagem
        boxMensagens.scrollTop = boxMensagens.scrollHeight;
    }

    // Permite enviar a mensagem apertando a tecla 'Enter'
    document.getElementById('pergunta').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            enviarMensagem();
        }
    });
</script>

</body>
</html>
